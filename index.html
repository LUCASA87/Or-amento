<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>DR Construções — Orçamentos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#c8962a;--gold-l:#f0c040;--cream:#fdf6ec;
  --dark:#1c1008;--text:#2e1a0a;
  --blue:#1a5fa8;--blue-h:#0d4a8a;
  --brick:#9b3a1a;--mortar:#b8a288;
  --red:#c0392b;--green:#1a7a3a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Lato',sans-serif;background:var(--dark);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* ── BRICK BG ── */
.brick-bg{position:fixed;inset:0;z-index:0;background-color:#6e2e10}
.brick-bg svg{position:absolute;inset:0;width:100%;height:100%;opacity:.88}
.brick-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,0,0,.05) 0%,rgba(0,0,0,.62) 100%)}

/* ── APP ── */
#app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
header{border-bottom:2.5px solid var(--gold);background:rgba(12,5,1,.82);backdrop-filter:blur(6px);padding:14px 18px;text-align:center}
.header-title{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--gold-l);letter-spacing:.5px}
.header-title::after{content:'';display:block;width:55px;height:2px;background:linear-gradient(90deg,var(--gold),var(--brick));margin:7px auto 0;border-radius:2px}

/* ── MAIN ── */
main{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:18px 10px 28px}
.card{background:rgba(253,246,236,.97);border-top:5px solid var(--gold);border-radius:3px;box-shadow:0 6px 40px rgba(0,0,0,.65);width:100%;max-width:480px;padding:0 0 24px;overflow:hidden}

/* ── PANELS ── */
.panels{padding:14px 14px 0;display:flex;flex-direction:column;gap:14px}
.panel{border-radius:4px;padding:14px 14px 16px;border:1px solid rgba(0,0,0,.08)}
.panel-blue{background:#dceef8;border-color:#a8cde8}
.panel-orange{background:#fde8b4;border-color:#e8c070}
.panel h3{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;margin-bottom:12px;color:var(--text);border-bottom:1.5px solid rgba(0,0,0,.1);padding-bottom:6px}
label{display:block;font-size:.74rem;font-weight:700;color:#555;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
input[type=text],input[type=number],input[type=tel]{width:100%;padding:10px 12px;border:1.5px solid #ccc;border-radius:3px;background:#fff;font-size:.95rem;font-family:'Lato',sans-serif;color:var(--text);outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,150,42,.15)}
.field{margin-bottom:11px}

/* ── MAT INPUTS ── */
.mat-input-row{display:grid;grid-template-columns:1fr 96px;gap:8px;margin-bottom:9px}
.btn-add{display:block;width:100%;padding:10px;background:#d4eaf8;border:2px solid #c04040;border-radius:4px;font-size:.88rem;font-weight:700;color:var(--text);cursor:pointer;text-align:center;font-family:'Lato',sans-serif;transition:background .15s;-webkit-tap-highlight-color:transparent}

/* ── HISTORY ── */
#item-history{margin-top:9px;max-height:190px;overflow-y:auto}
.hist-item{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.78);border:1px solid rgba(0,0,0,.1);border-radius:3px;padding:7px 9px;margin-bottom:5px;animation:slideIn .22s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:translateY(0)}}
.hist-name{color:var(--text);flex:1;font-weight:600;font-size:.83rem;word-break:break-word}
.hist-val{color:#7a2d10;font-weight:700;font-family:'Playfair Display',serif;font-size:.83rem;min-width:78px;text-align:right;padding:0 6px}
.btn-del{background:none;border:none;color:#c04040;font-size:1rem;cursor:pointer;padding:0;line-height:1;flex-shrink:0}

/* ── TOTAL ── */
.total-bar{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1.5px dashed rgba(0,0,0,.15);font-family:'Playfair Display',serif;font-size:.9rem;color:var(--text)}
.total-bar strong{color:var(--brick);font-size:1rem}

/* ── SUBMIT ── */
.submit-wrap{padding:18px 14px 0}
.btn-submit{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#1a6abd,#0d4a8a);border:2.5px solid var(--gold);border-radius:4px;color:#fff;font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;-webkit-tap-highlight-color:transparent}

/* ── FOOTER ── */
footer{background:rgba(8,3,1,.92);border-top:1.5px solid var(--gold);color:#666;font-size:.72rem;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(4px)}

/* ══ TOAST ══ */
#toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;width:90%;max-width:360px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,.45);font-family:'Lato',sans-serif;font-size:.88rem;font-weight:700;color:#fff;pointer-events:all;animation:toastIn .3s ease forwards;width:100%}
.toast.hide{animation:toastOut .3s ease forwards}

/* ══ BRICK ANIMATION ══ */
#brick-anim{position:fixed;inset:0;z-index:999;display:none;overflow:hidden}
#brick-anim.active{display:block;pointer-events:all}
#brick-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

/* ══ SUCCESS ══ */
#success-screen{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;padding:14px;background:rgba(10,4,1,.75);backdrop-filter:blur(4px)}
#success-screen.visible{display:flex}
.success-card{background:var(--cream);border-top:5px solid var(--gold);border-radius:4px;max-width:460px;width:100%;box-shadow:0 10px 50px rgba(0,0,0,.7);text-align:center;animation:fadeUp .45s ease forwards;max-height:92vh;overflow-y:auto}
.success-body{padding:20px 18px 24px}
.msg-box{background:#fff;border:1.5px solid #e8d0a0;border-radius:4px;padding:14px;text-align:left;font-size:.76rem;line-height:1.78;color:var(--text);white-space:pre-wrap;margin-bottom:18px;word-break:break-word}
.success-btns{display:flex;flex-direction:column;gap:10px}
.btn-whats{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#128c3e,#075e2d);border:2.5px solid #25d366;border-radius:4px;color:#fff;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;text-decoration:none;text-align:center}
.btn-new{display:block;width:100%;padding:13px;background:linear-gradient(135deg,#a0522d,#7a3b1e);border:2.5px solid var(--gold);border-radius:4px;color:#fff;font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;text-transform:uppercase}
</style>
</head>
<body>

<div class="brick-bg">
  <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <pattern id="bp" x="0" y="0" width="80" height="40" patternUnits="userSpaceOnUse">
      <rect x="1" y="1" width="74" height="16" rx="1" fill="#9b3a1a"/>
      <rect x="-39" y="22" width="74" height="16" rx="1" fill="#7a2d10"/>
      <rect x="37" y="22" width="74" height="16" rx="1" fill="#b04520"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#bp)"/>
  </svg>
  <div class="brick-overlay"></div>
</div>

<div id="toast-container"></div>

<div id="app">
  <header>
    <div class="header-title">Solicitar Orçamento</div>
  </header>

  <main>
    <div class="card" id="form-card">
      <div class="panels">
        <div class="panel panel-blue">
          <h3>🏗️ Registro do Cliente</h3>
          <div class="field">
            <label for="cli-nome">Nome Completo</label>
            <input type="text" id="cli-nome" placeholder="Ex: João da Silva"/>
          </div>
          <div class="field">
            <label for="cli-tel">WhatsApp (com DDD)</label>
            <input type="tel" id="cli-tel" placeholder="51 99999-9999" maxlength="13" oninput="maskTel(this)"/>
          </div>
          <div class="field">
            <label for="cli-obs">Observações</label>
            <input type="text" id="cli-obs" placeholder="Ex: Pintura externa"/>
          </div>
          <div class="field">
            <label for="cli-mao">Mão de Obra (R$)</label>
            <input type="number" id="cli-mao" placeholder="0,00" step="0.01"/>
          </div>
        </div>

        <div class="panel panel-orange">
          <h3>🧱 Materiais / Serviços</h3>
          <div class="mat-input-row">
            <div>
              <label for="mat-item">Item</label>
              <input type="text" id="mat-item" placeholder="Ex: Tinta 18L"/>
            </div>
            <div>
              <label for="mat-val">Valor (R$)</label>
              <input type="number" id="mat-val" placeholder="0,00" step="0.01"/>
            </div>
          </div>
          <button class="btn-add" onclick="addItem()">＋ Adicionar Item</button>
          <div id="item-history"></div>
          <div class="total-bar" id="total-bar" style="display:none">
            <span>Total Estimado</span>
            <strong id="total-val">R$ 0,00</strong>
          </div>
        </div>
      </div>

      <div class="submit-wrap">
        <button class="btn-submit" onclick="submitForm()">📤 &nbsp; Enviar Orçamento</button>
      </div>
    </div>
  </main>
</div>

<div id="brick-anim">
  <canvas id="brick-canvas"></canvas>
</div>

<div id="success-screen">
  <div class="success-card">
    <div class="success-body">
      <h2>Orçamento Pronto! ✅</h2>
      <div class="msg-box" id="msg-box"></div>
      <div class="success-btns">
        <a class="btn-whats" id="whats-link" href="#" target="_blank" rel="noopener">💬 &nbsp; Enviar pelo WhatsApp</a>
        <button class="btn-new" onclick="resetForm()">🏗️ &nbsp; Novo Orçamento</button>
      </div>
    </div>
  </div>
</div>

<script>
let items = [], itemId = 0;

function toast(msg, type='error'){
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = `<span class="toast-text">${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=> { t.classList.add('hide'); setTimeout(()=>t.remove(), 300); }, 3000);
}

function maskTel(el){
  let v = el.value.replace(/\D/g,'').slice(0,11);
  if(v.length > 7) v = v.slice(0,2)+' '+v.slice(2,7)+'-'+v.slice(7);
  else if(v.length > 2) v = v.slice(0,2)+' '+v.slice(2);
  el.value = v;
}

function addItem(){
  const nEl = document.getElementById('mat-item'), vEl = document.getElementById('mat-val');
  if(!nEl.value.trim()) return toast('Digite o nome do item.','warn');
  items.push({id:++itemId, nome:nEl.value.trim(), valor: vEl.value ? parseFloat(vEl.value) : null});
  nEl.value=''; vEl.value=''; renderHistory();
}

function renderHistory(){
  const h = document.getElementById('item-history'); h.innerHTML='';
  let total=0;
  items.forEach(it=>{
    const d = document.createElement('div'); d.className='hist-item';
    const vs = it.valor ? 'R$ '+it.valor.toLocaleString('pt-BR',{minimumFractionDigits:2}) : 'A confirmar';
    if(it.valor) total+=it.valor;
    d.innerHTML=`<span class="hist-name">${it.nome}</span><span class="hist-val">${vs}</span><button class="btn-del" onclick="items=items.filter(i=>i.id!=${it.id});renderHistory()">✕</button>`;
    h.appendChild(d);
  });
  document.getElementById('total-bar').style.display = items.length ? 'flex' : 'none';
  document.getElementById('total-val').textContent='R$ '+total.toLocaleString('pt-BR',{minimumFractionDigits:2});
}

function submitForm(){
  const nome = document.getElementById('cli-nome').value.trim();
  const tel = document.getElementById('cli-tel').value.trim();
  const obs = document.getElementById('cli-obs').value.trim();
  const mao = document.getElementById('cli-mao').value;

  if(!nome || tel.length < 10) return toast('Preencha nome e WhatsApp corretamente.');
  
  // LOGICA EDITADA: Só exige itens se não houver valor de mão de obra
  if(!items.length && !mao) return toast('Adicione itens ou o valor da mão de obra.');

  const currentTel = '55' + tel.replace(/\D/g,'');
  let total = mao ? parseFloat(mao) : 0;
  let list = '';
  items.forEach(i => {
    list += `• ${i.nome}${i.valor ? ' — R$ '+i.valor.toLocaleString('pt-BR') : ''}\n`;
    if(i.valor) total += i.valor;
  });

  let currentMsg = `Olá, ${nome}! 👋\n\nSegue seu orçamento:\n\n`;
  if(obs) currentMsg += `📋 ${obs}\n\n`;
  if(list) currentMsg += `*Materiais / Serviços:*\n${list}\n`;
  if(mao) currentMsg += `🔨 *Mão de obra:* R$ ${parseFloat(mao).toLocaleString('pt-BR',{minimumFractionDigits:2})}\n`;
  currentMsg += `\n💰 *Total: R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}*\n\n🏗️ *DR Construções*`;

  document.getElementById('msg-box').textContent = currentMsg.replace(/\*/g,'');
  
  const finalLink = `https://api.whatsapp.com/send?phone=${currentTel}&text=${encodeURIComponent(currentMsg)}`;
  const linkEl = document.getElementById('whats-link');
  linkEl.href = finalLink;
  
  linkEl.onclick = function() {
      if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
          window.open(finalLink, '_system');
          return false;
      }
      return true;
  };

  document.getElementById('brick-anim').classList.add('active');
  setTimeout(() => {
    document.getElementById('brick-anim').classList.remove('active');
    document.getElementById('success-screen').classList.add('visible');
  }, 1000);
}

function resetForm(){ location.reload(); }
</script>
</body>
</html>
